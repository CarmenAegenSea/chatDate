<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat 测试页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        h2 { font-size: 18px; margin-bottom: 12px; color: #1a1a1a; }
        input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; margin-bottom: 10px; }
        input:focus, textarea:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
        textarea { min-height: 80px; resize: vertical; }
        button { padding: 8px 20px; background: #1677ff; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        button:hover { background: #4096ff; }
        button.danger { background: #ff4d4f; }
        button.danger:hover { background: #ff7875; }
        button.sm { padding: 4px 12px; font-size: 12px; }
        .mood-options { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .mood-option { padding: 6px 14px; border: 1px solid #d9d9d9; border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; transition: all .2s; }
        .mood-option:hover { border-color: #1677ff; background: #f0f5ff; }
        .mood-option.selected { border-color: #1677ff; background: #e6f4ff; color: #1677ff; }
        .mood-tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 12px; font-weight: 400; margin-left: 6px; vertical-align: middle; background: #f0f5ff; color: #1677ff; }
        .type-tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 12px; font-weight: 400; margin-left: 6px; vertical-align: middle; background: #fff7e6; color: #d46b08; }
        .detail-btn { background: none; border: none; color: #1677ff; font-size: 13px; cursor: pointer; padding: 0; margin-left: 8px; }
        .detail-btn:hover { color: #4096ff; }
        .back-btn { background: none; border: 1px solid #d9d9d9; color: #333; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 12px; }
        .back-btn:hover { background: #f5f5f5; }
        .row { display: flex; gap: 10px; align-items: center; }
        .post-item { border-bottom: 1px solid #f0f0f0; padding: 12px 0; }
        .post-item:last-child { border-bottom: none; }
        .post-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .post-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .post-content { margin-top: 8px; color: #555; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-bar button { background: #e8e8e8; color: #333; flex: 1; min-width: 60px; }
        .tab-bar button.active { background: #1677ff; color: #fff; }
        .hidden { display: none; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 6px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 2px; }
        .user-info { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .user-info .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1677ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
        .user-info .name { font-size: 16px; font-weight: 600; }
        .user-info .phone { font-size: 13px; color: #999; }
        .badge { background: #f0f0f0; color: #666; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
        .loading { text-align: center; color: #999; padding: 20px; }
        .empty { text-align: center; color: #ccc; padding: 40px 0; font-size: 14px; }
        .result { margin-top: 8px; font-size: 13px; color: #666; }
        .divider { height: 1px; background: #f0f0f0; margin: 12px 0; }
        .like-btn { background: none; border: 1px solid #e0e0e0; border-radius: 20px; padding: 4px 14px; font-size: 13px; cursor: pointer; color: #666; line-height: 1.4; }
        .like-btn:hover { border-color: #f5a623; color: #f5a623; background: #fffbe6; }
        .like-btn.liked { border-color: #f5a623; color: #f5a623; background: #fffbe6; }
        .like-btn:disabled { cursor: default; opacity: 0.7; }
        .like-btn svg { vertical-align: -3px; margin-right: 2px; }
        .comment-btn { background: none; border: 1px solid #e0e0e0; border-radius: 20px; padding: 4px 14px; font-size: 13px; cursor: pointer; color: #666; line-height: 1.4; }
        .comment-btn:hover { border-color: #1677ff; color: #1677ff; background: #f0f5ff; }
        .comment-btn svg { vertical-align: -3px; margin-right: 2px; }
        .comment-section { margin-top: 12px; padding: 12px; background: #fafafa; border-radius: 8px; }
        .comment-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #555; }
        .comment-item:last-child { border-bottom: none; }
        .comment-meta { font-size: 11px; color: #bbb; margin-top: 2px; }
        .comment-input { width: calc(100% - 60px); padding: 8px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; outline: none; margin-right: 8px; }
        .comment-input:focus { border-color: #1677ff; }
        .post-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
        .comment-submit { padding: 6px 16px; font-size: 12px; }
        .bookmark-btn { background: none; border: 1px solid #e0e0e0; border-radius: 20px; padding: 4px 14px; font-size: 13px; cursor: pointer; color: #666; line-height: 1.4; }
        .bookmark-btn:hover { border-color: #f5a623; color: #f5a623; background: #fffbe6; }
        .bookmark-btn.bookmarked { border-color: #f5a623; color: #f5a623; background: #fffbe6; }
        .bookmark-btn svg { vertical-align: -3px; margin-right: 2px; }
        .post-menu-wrap { position: relative; display: inline-block; }
        .post-menu-btn { background: none; border: 1px solid #e0e0e0; border-radius: 50%; width: 28px; height: 28px; padding: 0; font-size: 14px; cursor: pointer; color: #999; display: flex; align-items: center; justify-content: center; }
        .post-menu-btn:hover { border-color: #999; color: #333; background: #f5f5f5; }
        .post-dropdown { position: absolute; right: 0; top: calc(100% + 4px); background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); z-index: 10; min-width: 90px; padding: 4px; }
        .post-dropdown button { display: block; width: 100%; padding: 6px 12px; text-align: left; background: none; color: #333; font-size: 13px; border-radius: 4px; }
        .post-dropdown button:hover { background: #f5f5f5; }
        .post-dropdown button.danger { color: #ff4d4f; }
        .post-dropdown button.danger:hover { background: #fff2f0; }
        .comment-extra { display: inline-block; }
        .comment-menu-btn { background: none; border: none; color: #bbb; font-size: 14px; cursor: pointer; padding: 0 4px; vertical-align: middle; }
        .comment-menu-btn:hover { color: #666; }
        .comment-menu-wrap { position: relative; display: inline-block; }
        .comment-dropdown { position: absolute; right: 0; top: calc(100% + 2px); background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.12); z-index: 10; min-width: 70px; padding: 4px; }
        .comment-dropdown button { display: block; width: 100%; padding: 4px 10px; text-align: left; background: none; color: #ff4d4f; font-size: 12px; border-radius: 4px; }
        .comment-dropdown button:hover { background: #fff2f0; }

        .game-option { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all .2s; }
        .game-option:hover { border-color: #1677ff; background: #f0f5ff; }
        .game-option.selected { border-color: #1677ff; background: #e6f4ff; }
        .game-option .check { width: 20px; height: 20px; border: 2px solid #d9d9d9; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; flex-shrink: 0; }
        .game-option.selected .check { background: #1677ff; border-color: #1677ff; }
        .game-option .gicon { font-size: 24px; }
        .game-option .gname { font-size: 15px; font-weight: 500; }

        .game-card { display: flex; align-items: center; padding: 16px; border: 1px solid #f0f0f0; border-radius: 10px; margin-bottom: 12px; transition: all .2s; cursor: pointer; }
        .game-card:hover { border-color: #1677ff; box-shadow: 0 2px 8px rgba(22,119,255,.08); }
        .game-card .gicon { font-size: 36px; margin-right: 16px; }
        .game-card .ginfo { flex: 1; }
        .game-card .gname { font-size: 17px; font-weight: 600; }
        .game-card .gcount { font-size: 13px; color: #999; margin-top: 2px; }
        .game-card .gcount strong { color: #1677ff; font-size: 18px; }
        .game-card .gbtn { padding: 6px 18px; font-size: 13px; }

        .more-toggle { display: block; width: 100%; padding: 10px; text-align: center; background: #fafafa; border: 1px dashed #d9d9d9; border-radius: 8px; font-size: 14px; color: #666; cursor: pointer; margin-top: 8px; transition: all .2s; }
        .more-toggle:hover { background: #f0f5ff; border-color: #1677ff; color: #1677ff; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 用户信息卡片（登录后展示） -->
        <div class="card user-info hidden" id="userSection">
            <div class="avatar" id="avatarLetter">U</div>
            <div>
                <div class="name" id="displayName">用户</div>
                <div class="phone" id="displayPhone">手机号</div>
            </div>
            <div style="margin-top:8px;">
                <span class="badge">已登录</span>
                <button class="danger sm" style="margin-left:8px;" onclick="logout()">退出</button>
            </div>
            <div class="divider"></div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <input id="nicknameInput" style="flex:1;margin:0;min-width:120px;" maxlength="32" placeholder="新昵称">
                <button class="sm" onclick="updateNickname()">修改昵称</button>
                <span class="result" id="nicknameResult"></span>
            </div>
        </div>

        <div class="tab-bar">
            <button class="active" onclick="switchTab('login')">登录</button>
            <button onclick="switchTab('post')">发帖</button>
            <button onclick="switchTab('rant')">吐槽墙</button>
            <button onclick="switchTab('wise')">万事通</button>
            <button onclick="switchTab('sell')">售卖墙</button>
            <button onclick="switchTab('game')">游戏</button>
            <button onclick="switchTab('settings')">设置</button>
        </div>

        <!-- 登录/注册 -->
        <div id="loginTab" class="card">
            <div class="tab-bar" style="margin-bottom:12px;">
                <button class="active" onclick="switchAuthTab('login')">登录</button>
                <button onclick="switchAuthTab('register')">注册</button>
            </div>

            <div id="authLogin">
                <h2>手机号+密码登录</h2>
                <div><label>手机号</label><input id="loginPhone" placeholder="13800138000" maxlength="11"></div>
                <div><label>密码</label><input id="loginPassword" type="password" placeholder="密码 (至少6位)"></div>
                <button onclick="login()">登录</button>
                <div class="result" id="loginResult"></div>
            </div>

            <div id="authRegister" class="hidden">
                <h2>手机号注册</h2>
                <div><label>手机号</label><input id="regPhone" placeholder="13800138000" maxlength="11"></div>
                <div><label>密码</label><input id="regPassword" type="password" placeholder="密码 (至少6位)"></div>
                <div><label>确认密码</label><input id="regPassword2" type="password" placeholder="再次输入密码"></div>
                <button onclick="register()">注册</button>
                <div class="result" id="regResult"></div>
            </div>

            <div class="divider"></div>
            <div style="text-align:center;font-size:13px;color:#999;margin-bottom:8px;">第三方登录</div>
            <div style="display:flex;gap:12px;justify-content:center;">
                <button style="background:#07c160;flex:1;" onclick="oauthLogin('wechat')">微信登录</button>
                <button style="background:#12b7f5;flex:1;" onclick="oauthLogin('qq')">QQ登录</button>
            </div>
        </div>

        <!-- 发帖 -->
        <div id="postTab" class="card hidden">
            <h2>发布帖子</h2>
            <div><label>帖子类型</label></div>
            <div style="display:flex;gap:8px;margin-bottom:10px;">
                <label style="display:flex;align-items:center;gap:4px;cursor:pointer;"><input type="radio" name="postType" value="rant" checked onchange="this.form.dataset.type=this.value"> 吐槽墙</label>
                <label style="display:flex;align-items:center;gap:4px;cursor:pointer;"><input type="radio" name="postType" value="wise" onchange="this.form.dataset.type=this.value"> 万事通</label>
                <label style="display:flex;align-items:center;gap:4px;cursor:pointer;"><input type="radio" name="postType" value="sell" onchange="this.form.dataset.type=this.value"> 售卖墙</label>
            </div>
            <div><label>心情（可选）</label></div>
            <div class="mood-options" id="moodOptions">
                <span class="mood-option" data-mood="开心" onclick="selectMood(this)">开心</span>
                <span class="mood-option" data-mood="搞笑" onclick="selectMood(this)">搞笑</span>
                <span class="mood-option" data-mood="难过" onclick="selectMood(this)">难过</span>
                <span class="mood-option" data-mood="愤怒" onclick="selectMood(this)">愤怒</span>
                <span class="mood-option" data-mood="思考" onclick="selectMood(this)">思考</span>
                <span class="mood-option" data-mood="推荐" onclick="selectMood(this)">推荐</span>
            </div>
            <div><label>标题</label><input id="postTitle" placeholder="帖子标题" maxlength="200"></div>
            <div><label>内容</label><textarea id="postContent" placeholder="写下你的想法..."></textarea></div>
            <div class="row"><button onclick="createPost()">发布</button><span class="result" id="postResult"></span></div>
        </div>

        <!-- 吐槽墙 -->
        <div id="rantTab" class="card hidden">
            <h2>吐槽墙</h2>
            <div style="margin-bottom:12px;"><button onclick="loadPosts('rant')">刷新列表</button></div>
            <div id="rantList"></div>
        </div>

        <!-- 万事通 -->
        <div id="wiseTab" class="card hidden">
            <h2>万事通</h2>
            <div style="margin-bottom:12px;"><button onclick="loadPosts('wise')">刷新列表</button></div>
            <div id="wiseList"></div>
        </div>

        <!-- 售卖墙 -->
        <div id="sellTab" class="card hidden">
            <h2>售卖墙</h2>
            <div style="margin-bottom:12px;"><button onclick="loadPosts('sell')">刷新列表</button></div>
            <div id="sellList"></div>
        </div>

        <!-- 帖子详情 -->
        <div id="detailTab" class="card hidden">
            <button class="back-btn" onclick="backToList()">← 返回列表</button>
            <div id="postDetail"></div>
        </div>

        <!-- 游戏陪玩 -->
        <div id="gameTab" class="hidden">
            <div id="gameLobbyView">
                <h2 style="margin-bottom:12px;">所有游戏</h2>
                <div id="gameLobbyContent"><div class="empty">点击右上角"游戏"按钮进入</div></div>
            </div>
            <div id="gameDetailView" class="hidden">
                <button class="back-btn" onclick="backToGameLobby()">← 返回</button>
                <div id="gameDetailContent"></div>
            </div>
        </div>

        <!-- 兴趣选择弹窗 -->
        <div id="interestModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;" onclick="if(event.target===this)closeInterestModal()">
            <div style="background:#fff;border-radius:12px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.15);">
                <h3 style="font-size:18px;margin-bottom:16px;">选择你感兴趣的游戏频道</h3>
                <p style="font-size:13px;color:#999;margin-bottom:12px;">选中的频道将在首页平铺展示，其余折叠在「更多频道」中</p>
                <div id="interestGameList"></div>
                <button onclick="saveInterestSetup()" style="margin-top:16px;width:100%;padding:10px;font-size:15px;">确认</button>
            </div>
        </div>

        <!-- 设置 -->
        <div id="settingsTab" class="hidden">
            <div class="card">
                <h2>修改昵称</h2>
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input id="settingsNickname" style="flex:1;min-width:120px;" maxlength="32" placeholder="输入新昵称">
                    <button onclick="updateNicknameFromSettings()">确认修改</button>
                    <span class="result" id="settingsNicknameResult"></span>
                </div>
            </div>
            <div class="card">
                <h2>游戏喜好</h2>
                <p style="font-size:13px;color:#999;margin-bottom:8px;">设置感兴趣的游戏频道，它们将在首页平铺展示</p>
                <button onclick="showInterestSetup()">修改游戏喜好</button>
            </div>
        </div>
    </div>



    <div id="toast" class="toast"></div>

    <script>
        const API = '';
        let currentUser = null;
        let selectedMood = '';

        function iconLike(filled) {
            return '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4L3 20h18z" fill="' + (filled ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
        }
        function iconBookmark(filled) {
            return '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M5 3h14v18l-7-5-7 5z" fill="' + (filled ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
        }
        function iconComment() {
            return '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M4 4h16v12H8l-4 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
        }

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function selectMood(el) {
            document.querySelectorAll('#moodOptions .mood-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedMood = el.dataset.mood;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            const labelMap = { login: '登录', post: '发帖', rant: '吐槽墙', wise: '万事通', sell: '售卖墙', game: '游戏频道', settings: '设置' };
            document.querySelectorAll('.tab-bar button').forEach(b => {
                if (b.textContent === labelMap[tab]) b.classList.add('active');
            });
            ['login','post','rant','wise','sell','detail','game','settings'].forEach(t => {
                const el = document.getElementById(t + 'Tab');
                if (el) el.classList.toggle('hidden', t !== tab);
            });
            // 记录帖子列表的 tab 类型，供 backToList 使用
            if (tab === 'rant' || tab === 'wise' || tab === 'sell') {
                window._lastListTab = tab;
            }
            if (tab === 'rant') loadPosts('rant');
            if (tab === 'wise') loadPosts('wise');
            if (tab === 'sell') loadPosts('sell');
            if (tab === 'game') loadGameModule();
            if (tab === 'settings') {
                ['settingsNicknameResult'].forEach(id => {
                    document.getElementById(id).textContent = '';
                });
            }
        }

        function setUser(data) {
            currentUser = data;
            document.getElementById('displayName').textContent = data.nickname;
            document.getElementById('displayPhone').textContent = data.phone || '第三方账号';
            document.getElementById('avatarLetter').textContent = data.nickname.charAt(0);
            document.getElementById('userSection').classList.remove('hidden');
        }

        async function api(path, body) {
            const res = await fetch(API + path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '请求失败');
            return data;
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('#loginTab .tab-bar button').forEach(b => b.classList.remove('active'));
            document.querySelector('#loginTab .tab-bar button:nth-child(' + (tab === 'login' ? 1 : 2) + ')').classList.add('active');
            document.getElementById('authLogin').classList.toggle('hidden', tab !== 'login');
            document.getElementById('authRegister').classList.toggle('hidden', tab !== 'register');
        }

        async function oauthLogin(provider) {
            const name = prompt('请输入昵称（或留空使用默认昵称）：');
            if (name === null) return;
            try {
                const openId = provider + '_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
                const data = await api('/api/auth/oauth', { provider, openId, nickname: name || undefined });
                setUser(data);
                toast(provider === 'wechat' ? '微信登录成功' : 'QQ登录成功');
            } catch (e) { toast(e.message); }
        }

        async function register() {
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const password2 = document.getElementById('regPassword2').value.trim();
            if (!phone || !password) { toast('请填写手机号和密码'); return; }
            if (password !== password2) { toast('两次密码不一致'); return; }
            try {
                const data = await api('/api/auth/register', { phone, password });
                setUser(data);
                document.getElementById('regResult').textContent = '注册成功 (ID: ' + data.id + ')';
                toast('注册成功');
            } catch (e) { toast(e.message); }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value.trim();

        async function createPost() {
            if (!currentUser) { toast('请先登录'); return; }
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const postType = document.querySelector('input[name="postType"]:checked');
            if (!title || !content) { toast('请填写标题和内容'); return; }
            try {
                const body = { title, content, type: postType ? postType.value : 'rant' };
                if (selectedMood) body.mood = selectedMood;
                const res = await fetch(API + '/api/posts?userId=' + currentUser.id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) { toast(data.message || '发帖失败'); return; }
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                selectedMood = '';
                document.querySelectorAll('#moodOptions .mood-option').forEach(o => o.classList.remove('selected'));
                document.getElementById('postResult').textContent = '发布成功';
                toast('发布成功');

        }

        async function loadPosts(type) {
            const elId = type + 'List';
            const el = document.getElementById(elId);
            if (!el) return;
            el.innerHTML = '<div class="loading">加载中...</div>';
            try {
                let url = API + '/api/posts?type=' + type;
                if (currentUser) url += '&userId=' + currentUser.id;
                const res = await fetch(url);
                const data = await res.json();
                if (!res.ok) { el.innerHTML = '<div class="empty">加载失败</div>'; return; }
                if (!data.length) { el.innerHTML = '<div class="empty">暂无帖子</div>'; return; }
                el.innerHTML = data.map((p, i) => {
                    const long = p.content.length > 50;
                    const truncated = long ? esc(p.content.substring(0, 50)) + '...' : esc(p.content);
                    const typeLabel = { rant: '吐槽墙', wise: '万事通', sell: '售卖墙' }[p.type] || '';
                    return '<div class="post-item">' +
                    '<div class="post-title">' + esc(p.title) + (p.mood ? '<span class="mood-tag">' + esc(p.mood) + '</span>' : '') + (typeLabel ? '<span class="type-tag">' + typeLabel + '</span>' : '') + '</div>' +
                    '<div class="post-meta">' +
                    (currentUser && p.author && p.author.id === currentUser.id ? esc(p.author.nickname) + ' · ' : '') +
                    fmt(p.createdAt) + '</div>' +
                    '<div class="post-content">' + truncated +
                    (long ? '<button class="detail-btn" onclick="viewDetail(' + p.id + ')">查看详情</button>' : '') +
                    '</div>' +
                    '<div class="post-actions">' +
                    '<button class="like-btn' + (p.liked ? ' liked' : '') + '" onclick="likePost(' + p.id + ', this)">' + iconLike(p.liked) + (p.likeCount || 0) + '</button>' +
                    (currentUser ? '<button class="bookmark-btn' + (p.bookmarked ? ' bookmarked' : '') + '" onclick="bookmarkPost(' + p.id + ', this)">' + iconBookmark(p.bookmarked) + (p.bookmarkCount || 0) + '</button>' : '') +
                    '<button class="comment-btn" onclick="toggleComments(' + p.id + ', this)">' + iconComment() + (p.commentCount || 0) + '</button>' +
                    (currentUser && p.author.id === currentUser.id ?
                      '<div class="post-menu-wrap" style="margin-left:auto;"><button class="post-menu-btn" onclick="event.stopPropagation();togglePostMenu(this)">···</button><div class="post-dropdown hidden"><button class="danger" onclick="deletePost(' + p.id + ', this)">删除</button></div></div>' : '') +
                    '</div>' +
                    '<div class="comment-section hidden" data-post-id="' + p.id + '">' +
                    '<div class="comment-list"></div>' +
                    '<div style="margin-top:8px;display:flex;">' +
                    '<input class="comment-input" placeholder="写评论..." maxlength="200">' +
                    '<button class="comment-submit" onclick="addComment(' + p.id + ', this)">发送</button>' +
                    '</div></div>' +
                    '</div>';
                }).join('');
            } catch (e) { el.innerHTML = '<div class="empty">请求失败: ' + e.message + '</div>'; }
        }

        async function toggleComments(postId, btn) {
            const section = btn.closest('.post-item').querySelector('.comment-section');
            const isHidden = section.classList.contains('hidden');
            section.classList.toggle('hidden');
            if (isHidden && !section.dataset.loaded) {
                section.querySelector('.comment-list').innerHTML = '<div class="loading">加载中...</div>';
                try {
                    const url = API + '/api/posts/' + postId + '/comments' + (currentUser ? '?userId=' + currentUser.id : '');
                    const res = await fetch(url);
                    const data = await res.json();
                    if (!res.ok) { section.querySelector('.comment-list').innerHTML = ''; return; }
                    section.dataset.loaded = '1';
                    section.querySelector('.comment-list').innerHTML = data.length
                        ? data.map(c => renderComment(c, postId)).join('')
                        : '<div style="color:#ccc;font-size:13px;text-align:center;padding:8px 0;">暂无评论</div>';
                } catch (e) {
                    section.querySelector('.comment-list').innerHTML = '<div style="color:#999;">加载失败</div>';
                }
            }
        }

            if (!currentUser) { toast('请先登录'); return; }
            const section = btn.closest('.comment-section');
            const input = section ? section.querySelector('.comment-input') : document.getElementById('detailCommentInput');
            const content = input.value.trim();
            if (!content) { toast('请输入评论内容'); return; }
            try {
                const res = await fetch(API + '/api/posts/' + postId + '/comments?userId=' + currentUser.id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await res.json();
                if (!res.ok) { toast(data.message || '评论失败'); return; }
                input.value = '';
                // 刷新评论列表（详情页或列表页）
                if (section) {
                    section.dataset.loaded = '';
                    const list = section.querySelector('.comment-list');
                    list.innerHTML = '<div class="loading">加载中...</div>';
                    try {
                        const url2 = API + '/api/posts/' + postId + '/comments' + (currentUser ? '?userId=' + currentUser.id : '');
                        const res2 = await fetch(url2);
                        const data2 = await res2.json();
                        if (!res2.ok) { list.innerHTML = ''; return; }
                        section.dataset.loaded = '1';

                            : '<div style="color:#ccc;font-size:13px;text-align:center;padding:8px 0;">暂无评论</div>';

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        async function loadGameModule() {
            if (!currentUser) { toast('请先登录'); return; }

        async function showInterestSetup() {
            document.getElementById('gameDetailView').classList.add('hidden');
            document.getElementById('gameLobbyView').classList.remove('hidden');
            document.getElementById('gameLobbyContent').innerHTML = '<div class="loading">加载游戏列表...</div>';

            interestSelectedCodes.clear();
            try {
                const res = await fetch(API + '/api/game/games');
                const allGames = await res.json();
                if (!res.ok || !allGames.length) { document.getElementById('gameLobbyContent').innerHTML = '<div class="empty">暂无游戏</div>'; return; }

                const list = document.getElementById('interestGameList');
                list.innerHTML = allGames.map(g =>
                    '<div class="game-option" data-code="' + g.code + '" onclick="toggleInterest(this)">' +
                    '<div class="check">✓</div>' +
                    '<span class="gicon">' + (g.icon || '🎮') + '</span>' +
                    '<span class="gname">' + esc(g.name) + '</span></div>'
                ).join('');
                document.getElementById('interestModal').style.display = 'flex';
            } catch (e) { document.getElementById('gameLobbyContent').innerHTML = '<div class="empty">加载失败</div>'; }
        }

        function toggleInterest(el) {
            el.classList.toggle('selected');
            const code = el.dataset.code;
            if (interestSelectedCodes.has(code)) interestSelectedCodes.delete(code);
            else interestSelectedCodes.add(code);
        }

        function closeInterestModal() {
            document.getElementById('interestModal').style.display = 'none';
            interestSelectedCodes.clear();
        }

        async function saveInterestSetup() {
            if (interestSelectedCodes.size === 0) { toast('请至少选择一个感兴趣的游戏'); return; }
            try {
                const res = await fetch(API + '/api/game/interests?userId=' + currentUser.id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameCodes: Array.from(interestSelectedCodes) })
                });
                if (!res.ok) { toast('保存失败'); return; }
                document.getElementById('interestModal').style.display = 'none';
                interestSelectedCodes.clear();
                loadGameLobby();
            } catch (e) { toast(e.message); }
        }

        async function loadGameLobby() {
            document.getElementById('gameDetailView').classList.add('hidden');
            document.getElementById('gameLobbyView').classList.remove('hidden');
            const el = document.getElementById('gameLobbyContent');
            el.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const res = await fetch(API + '/api/game/lobby?userId=' + currentUser.id);
                const data = await res.json();
                if (!res.ok) { el.innerHTML = '<div class="empty">加载失败</div>'; return; }
                if (!data.length) { el.innerHTML = '<div class="empty">暂无游戏</div>'; return; }

                const interested = data.filter(g => g.interested);
                const others = data.filter(g => !g.interested);

                function renderCard(g) {
                    return '<div class="game-card" onclick="enterGame(\'' + g.code + '\')">' +
                        '<span class="gicon">' + (g.icon || '🎮') + '</span>' +
                        '<div class="ginfo">' +
                        '<div class="gname">' + esc(g.name) + '</div>' +
                        '<div class="gcount">👥 <strong>' + g.currentPlayers + '</strong> 人</div>' +
                        '</div>' +
                        '<button class="gbtn" onclick="event.stopPropagation();enterGame(\'' + g.code + '\')">进入频道</button>' +
                        '</div>';
                }

                let html = interested.map(renderCard).join('');

                if (others.length) {
                    html += '<button class="more-toggle" onclick="toggleMoreGames(this)">更多频道 (<span class="more-count">' + others.length + '</span>) <span class="arrow">▼</span></button>' +
                        '<div class="more-games" style="max-height:0;">' +
                        others.map(renderCard).join('') +
                        '</div>';
                } else if (!interested.length) {
                    html = '<div class="empty">暂无游戏</div>';
                }

                el.innerHTML = html;
            } catch (e) { el.innerHTML = '<div class="empty">请求失败: ' + e.message + '</div>'; }
        }

        function backToGameLobby() {
            currentGameCode = null;
            loadGameLobby();
        }

        async function enterGame(gameCode) {
            currentGameCode = gameCode;
            document.getElementById('gameLobbyView').classList.add('hidden');
            document.getElementById('gameDetailView').classList.remove('hidden');
            const el = document.getElementById('gameDetailContent');
            el.innerHTML = '<div class="loading">加载详情...</div>';

            try {
                const [detailRes, statusRes] = await Promise.all([
                    fetch(API + '/api/game/' + gameCode + '/detail'),
                    currentUser ? fetch(API + '/api/game/' + gameCode + '/status?userId=' + currentUser.id) : Promise.resolve(null)
                ]);

                const data = await detailRes.json();
                if (!detailRes.ok) { el.innerHTML = '<div class="empty">加载失败</div>'; return; }

                let status = { joined: false };
                if (statusRes && statusRes.ok) status = await statusRes.json();

                let html = '<div class="card" style="padding:16px;margin-bottom:12px;">' +
                    '<div style="display:flex;align-items:center;gap:16px;">' +
                    '<div style="font-size:36px;">' + (data.game.icon || '🎮') + '</div>' +
                    '<div style="flex:1;">' +
                    '<h2 style="font-size:20px;margin:0;">' + esc(data.game.name) + '</h2>' +
                    '<div style="font-size:14px;color:#999;margin-top:4px;">当前频道 <strong>' + data.game.currentPlayers + '</strong> 人</div>' +
                    '</div>' +
                    '</div>' +
                    '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">';

                if (status.joined) {
                    html += '<span style="padding:6px 16px;border-radius:6px;background:#f0f5ff;color:#1677ff;font-size:13px;">已加入频道</span>';
                } else {
                    html += '<button onclick="joinChannel(\'' + gameCode + '\')" style="padding:6px 16px;font-size:13px;">加入频道</button>';
                }

                html += '</div></div>';

                el.innerHTML = html;
            } catch (e) { el.innerHTML = '<div class="empty">请求失败: ' + e.message + '</div>'; }
        }

        async function joinChannel(gameCode) {
            if (!currentUser) { toast('请先登录'); return; }
            try {
                const res = await fetch(API + '/api/game/' + gameCode + '/join?userId=' + currentUser.id, { method: 'POST' });
                if (!res.ok) { const d = await res.json(); toast(d.message || '加入失败'); return; }
                toast('已加入频道');
                enterGame(gameCode);
            } catch (e) { toast(e.message); }
        }

        function toggleMoreGames(btn) {
            const container = btn.nextElementSibling;
            const arrow = btn.querySelector('.arrow');
            const isOpen = container.style.maxHeight && container.style.maxHeight !== '0px';
            if (isOpen) {
                container.style.maxHeight = '0';
                arrow.classList.remove('open');
            } else {
                container.style.maxHeight = container.scrollHeight + 'px';
                arrow.classList.add('open');
            }
        }

            if (!currentUser) { toast('请先登录'); return; }
            const nickname = document.getElementById('settingsNickname').value.trim();
            if (!nickname) { toast('请输入昵称'); return; }
            try {
                const res = await fetch(API + '/api/auth/nickname?userId=' + currentUser.id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname })
                });
                const text = await res.text();
                const data = JSON.parse(text);
                if (!res.ok) { toast(data.message || '修改失败'); return; }
                setUser(data);
                document.getElementById('settingsNickname').value = '';
                document.getElementById('settingsNicknameResult').textContent = '昵称已更新';
                toast('昵称修改成功');
            } catch (e) { toast(e.message); }
        }

        // 初始显示登录页
    </script>
</body>
</html>
